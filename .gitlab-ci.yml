image: python:3.9

stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/

before_script:
  - python --version
  # Configure git to use the CI job token for authentication
  - |
    cat > ~/.netrc << EOF
    machine gitlab.naerm.team
    login gitlab-ci-token
    password ${CI_JOB_TOKEN}
    EOF
    chmod 600 ~/.netrc
  - pip install -e ".[test,dev]"

lint:
  stage: lint
  script:
    - ruff check .
    - ruff format --check .

test:
  stage: test
  script:
    - pytest -v --cov=src/pyenergymarket tests/ --junitxml=junit.xml
    - coverage report
    - coverage xml
    - coverage html
    # Extract coverage percentage for GitLab UI
    - |
      coverage_report=$(coverage report)
      echo "$coverage_report"
      coverage_line=$(echo "$coverage_report" | grep "TOTAL")
      coverage_percentage=$(echo "$coverage_line" | grep -o '[0-9]\+%' | head -1)
      echo "Coverage: $coverage_percentage"
  coverage: '/Coverage: (\d+\%)/i'
  artifacts:
    paths:
      - htmlcov/
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
