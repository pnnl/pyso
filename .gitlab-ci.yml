stages:
  - build
  - lint
  - test
  - security

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  DOCKER_IMAGE_NAME: "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}"

# Common configuration to be extended
.common_config:
  image: "${DOCKER_IMAGE_NAME}"
  cache:
    paths:
      - .pip-cache/

# Build stage: Create Docker image with all dependencies installed
build:
  stage: build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
  script:
    - |
      echo "FROM python:3.10" > Dockerfile
      echo "RUN apt-get update -qq && apt-get install -y coinor-cbc" >> Dockerfile
      echo "WORKDIR /app" >> Dockerfile
      echo "COPY . ." >> Dockerfile
      echo "RUN cat > ~/.netrc << EOF" >> Dockerfile
      echo "machine gitlab.naerm.team" >> Dockerfile
      echo "login gitlab-ci-token" >> Dockerfile
      echo "password ${CI_JOB_TOKEN}" >> Dockerfile
      echo "EOF" >> Dockerfile
      echo "RUN chmod 600 ~/.netrc" >> Dockerfile
      echo "RUN pip install -e '.[test,dev]'" >> Dockerfile
    - docker build -t "${DOCKER_IMAGE_NAME}" .
    - docker push "${DOCKER_IMAGE_NAME}"

# Lint stage: Use the pre-built image
lint:
  extends: .common_config
  stage: lint
  needs:
    - build
  script:
    - python --version
    - ruff check .
    - ruff format --check .

# Test stage: Use the pre-built image
test:
  extends: .common_config
  stage: test
  needs:
    - build
  script:
    - pytest -v --cov=src/pyenergymarket tests/ --junitxml=junit.xml
    - coverage report
    - coverage xml
    - coverage html
    # Extract coverage percentage for GitLab UI
    - |
      coverage_report=$(coverage report)
      echo "$coverage_report"
      coverage_line=$(echo "$coverage_report" | grep "TOTAL")
      coverage_percentage=$(echo "$coverage_line" | grep -o '[0-9]\+%' | head -1)
      echo "Coverage: $coverage_percentage"
  coverage: '/Coverage: (\d+\%)/i'
  artifacts:
    paths:
      - htmlcov/
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always

# Security stage: Use the pre-built image
security:
  extends: .common_config
  stage: security
  needs:
    - build
  script:
    - pip install bandit safety
    # Skip B101 (assert_used) check since we've replaced critical assertions with proper validation
    - bandit -r src/
    - safety check
