# Lint stage: Use the pre-built image
lint:
  extends: .common_config
  stage: lint
  needs:
    - build
  script:
    - python --version
    - ruff check .
    - ruff format --check .

# Test stage: Use the pre-built image
test:
  extends: .common_config
  stage: test
  needs:
    - build
  script:
    - pytest -v --cov=src/pyenergymarket tests/ --junitxml=junit.xml
    - coverage report
    - coverage xml
    - coverage html
    # Extract coverage percentage for GitLab UI
    - |
      coverage_report=$(coverage report)
      echo "$coverage_report"
      coverage_line=$(echo "$coverage_report" | grep "TOTAL")
      coverage_percentage=$(echo "$coverage_line" | grep -o '[0-9]\+%' | head -1)
      echo "Coverage: $coverage_percentage"
  coverage: '/Coverage: (\d+\%)/i'
  artifacts:
    paths:
      - htmlcov/
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
